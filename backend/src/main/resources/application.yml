spring:
  application:
    name: flashcard-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/khaleo_flashcard}
    username: ${DB_USERNAME:khaleo}
    password: ${DB_PASSWORD:khaleo}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  dynamo:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${DYNAMODB_ENDPOINT:}
    study-activity-log-table: ${STUDY_ACTIVITY_LOG_TABLE:StudyActivityLog}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:khaleo}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
      secret: ${JWT_SECRET:change-me-dev-secret-change-me-dev-secret}
    lockout:
      max-failed-attempts: ${AUTH_LOCKOUT_MAX_FAILED_ATTEMPTS:5}
      duration-seconds: ${AUTH_LOCKOUT_DURATION_SECONDS:86400}
    email:
      from: ${AUTH_EMAIL_FROM:no-reply@coursekhaleo.click}
      verification-base-url: ${AUTH_VERIFICATION_BASE_URL:https://app.coursekhaleo.click/verify}
      reset-base-url: ${AUTH_RESET_BASE_URL:https://app.coursekhaleo.click/reset-password}
