version: "3.9"

services:
  khaleomysql:
    image: mysql:8.0
    container_name: khaleomysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: khaleo_flashcard
      MYSQL_USER: khaleo
      MYSQL_PASSWORD: khaleo
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - khaleo_mysql_data:/var/lib/mysql

volumes:
  khaleo_mysql_data:
