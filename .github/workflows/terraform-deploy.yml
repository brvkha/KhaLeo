name: "Terraform Infrastructure Deploy"

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**' # Chỉ kích hoạt workflow khi có code Terraform thay đổi

permissions:
  id-token: write # Bắt buộc phải có để lấy token OIDC đăng nhập AWS
  contents: read

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::817888697629:role/github-actions-khaleo-prod-role
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      # Bước này giúp kiểm tra xem code lỗi hay không trước khi chạy thật
      - name: Terraform Plan
        run: terraform plan -no-color

      # Chỉ chạy apply tự động khi code được push/merge vào nhánh main
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve